<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DF7351"/>
      <stop offset="1" stop-color="#A33614"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA284"/>
      <stop offset="0.5" stop-color="#CD5029"/>
      <stop offset="1" stop-color="#A33614"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Centered flame (scaled and translated to fit within 1024x1024) -->
  <g transform="translate(262, 120) scale(2.5)">
    <!-- Inner flame flicker for depth -->
    <path d="M 100 40 C 106 56, 132 78, 146 100 C 158 120, 160 136, 158 150 C 155 168, 140 180, 130 186 C 118 192, 108 192, 100 192 C 92 192, 82 192, 70 186 C 60 180, 45 168, 42 150 C 40 136, 42 120, 54 100 C 68 78, 94 56, 100 40 Z" fill="rgba(255,255,255,0.08)"/>

    <!-- Piggy bank body -->
    <path d="M 62 168 C 62 148, 72 132, 88 128 C 92 126, 96 120, 92 114 C 90 110, 92 106, 96 108 C 100 110, 100 116, 98 122 C 100 120, 104 120, 106 122 C 104 116, 104 110, 108 108 C 112 106, 114 110, 112 114 C 108 120, 112 126, 116 128 C 132 132, 142 148, 142 168 C 148 164, 156 160, 158 164 C 160 168, 158 176, 152 176 C 148 176, 146 172, 142 174 C 142 186, 140 196, 138 204 C 136 210, 132 210, 130 204 C 128 196, 126 190, 118 190 C 110 190, 86 190, 78 190 C 76 196, 74 204, 72 204 C 70 210, 66 210, 64 204 C 62 196, 62 186, 62 168 Z" fill="white"/>

    <!-- Piggy eye -->
    <circle cx="124" cy="142" r="4.5" fill="#1E6581"/>

    <!-- Piggy nostril -->
    <circle cx="152" cy="168" r="2" fill="rgba(163,54,20,0.5)"/>

    <!-- Curly tail -->
    <path d="M 64 160 C 54 154, 48 158, 50 164 C 52 170, 58 168, 58 162 C 58 156, 52 152, 46 156" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Coin slot -->
    <path d="M 92 130 L 112 130" fill="none" stroke="rgba(163,54,20,0.35)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
